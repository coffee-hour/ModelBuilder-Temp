<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POKE-ROUGE | Team Builder</title>
    <style>
        :root {
            --obsidian: #0d0d0d;
            --amber: #ff4500;
            --blood: #8b0000;
            --text: #f3f4f6;
            --panel: #151515;
            --highlight: #3b82f6;
        }
        body {
            background-color: var(--obsidian);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }
        #game-container {
            width: 95%;
            max-width: 800px;
            border: 2px solid var(--amber);
            padding: 20px;
            background: rgba(13, 13, 13, 0.95);
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.15);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--amber);
            margin-bottom: 15px;
            padding-bottom: 5px;
        }
        h1 { color: var(--amber); font-size: 1.8em; margin: 0; letter-spacing: 3px; }
        
        .team-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .hero-box {
            background: var(--panel);
            padding: 10px;
            border: 1px solid #333;
            text-align: center;
            position: relative;
        }
        .hero-box.active { border-color: var(--amber); box-shadow: inset 0 0 10px rgba(255, 69, 0, 0.2); }
        .hero-box.empty { color: #444; border-style: dashed; }
        .hero-name { font-size: 0.9em; font-weight: bold; color: var(--amber); }
        .hero-hp { font-size: 0.7em; margin-top: 5px; }
        .hp-bar-outer { width: 100%; height: 4px; background: #222; margin-top: 5px; }
        .hp-bar-inner { height: 100%; background: var(--amber); transition: width 0.3s; }

        #room-display {
            height: 200px;
            background: #080808;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            position: relative;
        }
        #room-type { font-size: 0.7em; color: var(--amber); position: absolute; top: 10px; left: 10px; }
        #room-desc { font-size: 1em; line-height: 1.4; margin-bottom: 10px; }
        #enemy-stats { font-size: 0.8em; color: var(--blood); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--amber);
            padding: 15px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { background: var(--amber); color: var(--obsidian); }
        button:disabled { border-color: #333; color: #444; cursor: not-allowed; }
        button.primary { background: var(--amber); color: var(--obsidian); grid-column: span 2; font-weight: bold; }

        #log {
            margin-top: 15px;
            height: 80px;
            font-size: 0.75em;
            color: #666;
            overflow-y: hidden;
            border-left: 2px solid var(--blood);
            padding-left: 10px;
        }
        .death-screen {
            position: absolute; inset: 0; background: var(--obsidian);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="header">
            <h1>POKE-ROUGE</h1>
            <div style="font-size: 0.7em;">Floor: <span id="floor">1</span> | Rep: <span id="rep">0</span></div>
        </div>

        <div class="team-bar" id="team-slots">
            <!-- Slots -->
        </div>

        <div id="room-display">
            <div id="room-type">---</div>
            <div id="room-desc">Simulation loading...</div>
            <div id="enemy-stats" style="display: none;">
                <span id="e-name">Target</span>: <span id="e-hp">0</span> HP
            </div>
        </div>

        <div class="actions" id="action-grid"></div>

        <div id="log"></div>
    </div>

    <div id="death-screen" class="death-screen">
        <h2 style="color: var(--blood); font-size: 3em;">WIPED</h2>
        <p>The team has been eliminated.</p>
        <button onclick="resetGame()" style="margin-top: 20px; width: 200px;">Restart Simulation</button>
    </div>

    <script>
        const HERO_DATABASE = {
            'INVINCIBLE': { hp: 120, maxHp: 120, speed: 12, dmg: 15, role: 'Bruiser' },
            'ROBOT': { hp: 150, maxHp: 150, speed: 8, dmg: 10, role: 'Tank' },
            'ATOM EVE': { hp: 90, maxHp: 90, speed: 14, dmg: 18, role: 'Blaster' },
            'REX SPLODE': { hp: 80, maxHp: 80, speed: 11, dmg: 22, role: 'Glass Cannon' },
            'DUPLI-KATE': { hp: 100, maxHp: 100, speed: 15, dmg: 8, role: 'Utility' }
        };

        const INITIAL_STATE = {
            team: [JSON.parse(JSON.stringify(HERO_DATABASE['INVINCIBLE']))],
            rep: 0,
            floor: 1,
            activeHeroIdx: 0
        };

        let state = JSON.parse(localStorage.getItem('pokerouge_save')) || JSON.parse(JSON.stringify(INITIAL_STATE));
        let currentEnemy = null;

        const ui = {
            floor: document.getElementById('floor'),
            rep: document.getElementById('rep'),
            team: document.getElementById('team-slots'),
            roomType: document.getElementById('room-type'),
            roomDesc: document.getElementById('room-desc'),
            eStats: document.getElementById('enemy-stats'),
            eName: document.getElementById('e-name'),
            eHp: document.getElementById('e-hp'),
            actions: document.getElementById('action-grid'),
            log: document.getElementById('log'),
            death: document.getElementById('death-screen')
        };

        function addLog(msg) {
            const d = document.createElement('div');
            d.innerText = `> ${msg}`;
            ui.log.prepend(d);
            if (ui.log.children.length > 4) ui.log.lastChild.remove();
        }

        function updateUI() {
            ui.floor.innerText = state.floor;
            ui.rep.innerText = state.rep;
            
            // Team UI
            ui.team.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const hero = state.team[i];
                const box = document.createElement('div');
                box.className = `hero-box ${hero ? '' : 'empty'} ${i === state.activeHeroIdx ? 'active' : ''}`;
                if (hero) {
                    const hpPerc = (hero.hp / hero.maxHp) * 100;
                    box.innerHTML = `
                        <div class="hero-name">${hero.name || Object.keys(HERO_DATABASE).find(k => HERO_DATABASE[k].dmg === hero.dmg && HERO_DATABASE[k].maxHp === hero.maxHp)}</div>
                        <div class="hero-hp">${hero.hp}/${hero.maxHp}</div>
                        <div class="hp-bar-outer"><div class="hp-bar-inner" style="width: ${hpPerc}%"></div></div>
                    `;
                } else {
                    box.innerText = '[EMPTY SLOT]';
                }
                ui.team.appendChild(box);
            }

            localStorage.setItem('pokerouge_save', JSON.stringify(state));
            
            if (state.team.every(h => h.hp <= 0)) {
                ui.death.style.display = 'flex';
            }
        }

        function resetGame() {
            state = JSON.parse(JSON.stringify(INITIAL_STATE));
            ui.death.style.display = 'none';
            ui.log.innerHTML = '';
            generateRoom();
            updateUI();
        }

        function generateRoom() {
            ui.eStats.style.display = 'none';
            const r = Math.random();
            if (r < 0.7) startCombat();
            else startRecruitment();
        }

        function startCombat() {
            const eTypes = ['Flaxan Brute', 'Mauler Clone', 'Sequid', 'Battle Beast'];
            const eName = eTypes[Math.floor(Math.random() * eTypes.length)];
            currentEnemy = {
                name: eName,
                hp: 30 + (state.floor * 20),
                dmg: 8 + (state.floor * 4),
                speed: 8 + state.floor
            };
            
            ui.roomType.innerText = 'BATTLE';
            ui.roomDesc.innerText = `A ${eName} intercepts your team.`;
            ui.eStats.style.display = 'block';
            ui.eName.innerText = currentEnemy.name;
            ui.eHp.innerText = currentEnemy.hp;
            
            renderActions([
                { text: 'Strike', cb: handleAttack, primary: true },
                { text: 'Switch Hero', cb: showSwitchMenu }
            ]);
        }

        function handleAttack() {
            const hero = state.team[state.activeHeroIdx];
            if (!hero || hero.hp <= 0) return;

            // Hero Attack
            if (Math.random() * hero.speed > Math.random() * currentEnemy.speed) {
                currentEnemy.hp -= hero.dmg;
                addLog(`${hero.name || 'Hero'} hits ${currentEnemy.name} for ${hero.dmg}.`);
            } else {
                addLog(`${currentEnemy.name} dodged the attack.`);
            }

            if (currentEnemy.hp <= 0) {
                state.rep += 20 + (state.floor * 5);
                state.floor++;
                addLog('Victory. Moving to next sector.');
                generateRoom();
            } else {
                // Enemy Turn
                if (Math.random() * currentEnemy.speed > Math.random() * (hero.speed / 2)) {
                    hero.hp -= currentEnemy.dmg;
                    addLog(`${currentEnemy.name} retaliates. -${currentEnemy.dmg} HP.`);
                }
                if (hero.hp <= 0) {
                    hero.hp = 0;
                    addLog(`${hero.name || 'Hero'} has fallen!`);
                    showSwitchMenu();
                }
            }
            ui.eHp.innerText = Math.max(0, currentEnemy.hp);
            updateUI();
        }

        function showSwitchMenu() {
            const options = state.team.map((h, i) => ({
                text: h ? `${h.name || 'Hero'} (${h.hp} HP)` : 'Empty',
                cb: () => { if (h && h.hp > 0) { state.activeHeroIdx = i; startCombat(); updateUI(); } },
                disabled: !h || h.hp <= 0 || i === state.activeHeroIdx
            }));
            renderActions(options);
        }

        function startRecruitment() {
            ui.roomType.innerText = 'RESCUE OPS';
            const pool = Object.keys(HERO_DATABASE).filter(name => !state.team.find(h => h.name === name));
            if (pool.length === 0 || state.team.length >= 3) {
                ui.roomDesc.innerText = 'A quiet GDA outpost. Your team recovers.';
                state.team.forEach(h => h.hp = Math.min(h.maxHp, h.hp + 20));
                renderActions([{ text: 'Continue', cb: () => { state.floor++; generateRoom(); } }]);
                updateUI();
                return;
            }

            const candidate = pool[Math.floor(Math.random() * pool.length)];
            ui.roomDesc.innerText = `You find ${candidate} pinned down. Assist them?`;
            renderActions([
                { text: `Recruit ${candidate}`, cb: () => recruitHero(candidate) },
                { text: 'Leave them', cb: () => { state.floor++; generateRoom(); } }
            ]);
        }

        function recruitHero(name) {
            const heroData = JSON.parse(JSON.stringify(HERO_DATABASE[name]));
            heroData.name = name;
            state.team.push(heroData);
            addLog(`${name} has joined the roster.`);
            state.floor++;
            generateRoom();
            updateUI();
        }

        function renderActions(acts) {
            ui.actions.innerHTML = '';
            acts.forEach(a => {
                const b = document.createElement('button');
                b.innerText = a.text;
                if (a.primary) b.className = 'primary';
                if (a.disabled) b.disabled = true;
                b.onclick = a.cb;
                ui.actions.appendChild(b);
            });
        }

        // Fix name assignment for initial load
        state.team.forEach((h, i) => {
            if (!h.name) {
                h.name = Object.keys(HERO_DATABASE).find(k => HERO_DATABASE[k].dmg === h.dmg && HERO_DATABASE[k].maxHp === h.maxHp);
            }
        });

        updateUI();
        generateRoom();
    </script>
</body>
</html>
