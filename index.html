<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exact Color Text Art</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; text-align: center; }
        p { color: #7f8c8d; margin-top: 0; text-align: center; margin-bottom: 20px; }
        .container {
            max-width: 800px; width: 100%; background: #ffffff;
            padding: 30px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); box-sizing: border-box;
        }
        .controls {
            background: #f8f9fa; padding: 20px; border-radius: 8px;
            margin-bottom: 20px; border: 1px solid #e9ecef;
            display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 0.9rem; color: #495057; }
        input[type="text"] {
            padding: 6px; border-radius: 4px; border: 1px solid #ced4da;
            width: 80px; font-family: monospace; text-align: center; font-size: 1rem;
        }
        select, input[type="range"], input[type="file"] {
            padding: 5px; border-radius: 4px; border: 1px solid #ced4da; cursor: pointer;
        }
        button {
            background-color: #3498db; color: white; border: none;
            padding: 10px 20px; border-radius: 6px; font-weight: bold;
            cursor: pointer; transition: 0.2s; margin-left: auto;
        }
        button:hover { background-color: #2980b9; }
        
        /* The output area needs specific styling to keep characters perfectly aligned */
        #output {
            white-space: pre; 
            font-family: monospace; 
            line-height: 0.8; /* Tight line height keeps rows from having huge gaps */
            letter-spacing: 0px; 
            font-size: 10px; 
            background: #111111;
            padding: 20px; 
            border-radius: 8px; 
            overflow-x: auto;
            max-width: 100%; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Exact Color Text Art</h1>
    <p>Turn photos into colored text characters with 100% color accuracy.</p>
    
    <div class="controls">
        <div class="control-group">
            <label for="upload">1. Upload Image</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        
        <div class="control-group">
            <label for="resolution">2. Detail (<span id="resValue">60</span>px)</label>
            <input type="range" id="resolution" min="20" max="150" value="60">
        </div>

        <div class="control-group">
            <label for="charInput">3. Custom Character</label>
            <input type="text" id="charInput" value="█" maxlength="2"> 
        </div>

        <button id="copyBtn">Copy HTML Code</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="output">Your true-color text art will appear here...</div>
</div>

<script>
    const upload = document.getElementById('upload');
    const resolution = document.getElementById('resolution');
    const resValue = document.getElementById('resValue');
    const charInput = document.getElementById('charInput');
    const copyBtn = document.getElementById('copyBtn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const output = document.getElementById('output');

    let currentImage = null;

    // --- EVENT LISTENERS ---
    upload.addEventListener('change', handleUpload);
    
    resolution.addEventListener('input', (e) => {
        resValue.textContent = e.target.value;
        generateTextArt();
    });
    
    charInput.addEventListener('input', () => {
        if(charInput.value === '') charInput.value = ' '; // Default to space if empty
        generateTextArt();
    });

    // We copy the actual HTML code now, so you can paste it into a website
    copyBtn.addEventListener('click', () => {
        if (!currentImage) return alert("Upload an image first!");
        navigator.clipboard.writeText(output.innerHTML).then(() => {
            copyBtn.textContent = "HTML Copied!";
            setTimeout(() => { copyBtn.textContent = "Copy HTML Code"; }, 2000);
        });
    });

    function handleUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                currentImage = img;
                generateTextArt();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function generateTextArt() {
        if (!currentImage) return;

        const targetWidth = parseInt(resolution.value);
        // Characters are usually twice as tall as they are wide. 0.5 fixes the stretch.
        const targetHeight = Math.round((currentImage.height / currentImage.width) * targetWidth * 0.5);
        
        const pixelChar = charInput.value || '█'; 

        canvas.width = targetWidth;
        canvas.height = targetHeight;
        ctx.drawImage(currentImage, 0, 0, targetWidth, targetHeight);

        const imgData = ctx.getImageData(0, 0, targetWidth, targetHeight).data;
        
        // We will build a giant string of HTML <span> tags
        let resultHTML = "";

        for (let y = 0; y < targetHeight; y++) {
            for (let x = 0; x < targetWidth; x++) {
                const idx = (y * targetWidth + x) * 4;
                const r = imgData[idx];
                const g = imgData[idx + 1];
                const b = imgData[idx + 2];
                const a = imgData[idx + 3];

                // If pixel is mostly transparent, leave an empty space
                if (a < 128) {
                    resultHTML += `<span style="color: transparent;">${pixelChar}</span>`;
                    continue;
                }

                // Apply the exact RGB color to the user's custom character
                resultHTML += `<span style="color: rgb(${r},${g},${b});">${pixelChar}</span>`;
            }
            resultHTML += "\n";
        }
        
        // Because we are using HTML tags, we must use .innerHTML instead of .textContent
        output.innerHTML = resultHTML;
    }
</script>

</body>
</html>
