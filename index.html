<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Emoji Pixel Art</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            text-align: center;
        }
        p {
            color: #7f8c8d;
            margin-top: 0;
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }
        .controls {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
        }
        input[type="file"] {
            font-size: 0.9rem;
        }
        select, input[type="range"] {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            cursor: pointer;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            align-self: flex-end;
        }
        button:hover {
            background-color: #2980b9;
        }
        #output {
            white-space: pre;
            font-family: monospace;
            line-height: 1.1;
            letter-spacing: 1px;
            font-size: 8px; /* Change this if you want bigger/smaller default text */
            background: #111111;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            max-width: 100%;
            color: #ffffff;
            box-sizing: border-box;
        }
        .light-bg {
            background: #f8f9fa !important;
            color: #000000 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Custom Emoji Pixel Art</h1>
    <p>Upload, customize, and copy your emoji masterpiece.</p>
    
    <div class="controls">
        <div class="control-group">
            <label for="upload">1. Upload Image</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        
        <div class="control-group">
            <label for="resolution">2. Detail Level (<span id="resValue">45</span>px)</label>
            <input type="range" id="resolution" min="15" max="100" value="45">
        </div>

        <div class="control-group">
            <label for="styleSelect">3. Emoji Style</label>
            <select id="styleSelect">
                <option value="circles">Circles (🔴🔵)</option>
                <option value="squares">Squares (🟥🟦)</option>
                <option value="hearts">Hearts (❤️💙)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="bgSelect">4. Canvas Background</label>
            <select id="bgSelect">
                <option value="dark">Dark Mode</option>
                <option value="light">Light Mode</option>
            </select>
        </div>

        <button id="copyBtn">Copy Art</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="output">Your emoji art will appear here...</div>
</div>

<script>
    const upload = document.getElementById('upload');
    const resolution = document.getElementById('resolution');
    const resValue = document.getElementById('resValue');
    const styleSelect = document.getElementById('styleSelect');
    const bgSelect = document.getElementById('bgSelect');
    const copyBtn = document.getElementById('copyBtn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const output = document.getElementById('output');

    let currentImage = null;

    // Define the base RGB colors for our matching algorithm
    const baseColors = [
        { r: 224, g: 36, b: 94 },   // Red
        { r: 244, g: 144, b: 12 },  // Orange
        { r: 255, g: 204, b: 77 },  // Yellow
        { r: 119, g: 178, b: 85 },  // Green
        { r: 59, g: 148, b: 216 },  // Blue
        { r: 170, g: 142, b: 214 }, // Purple
        { r: 193, g: 105, b: 79 },  // Brown
        { r: 35, g: 37, b: 40 },    // Black
        { r: 230, g: 236, b: 240 }  // White
    ];

    // Define different shape themes matching the color order above
    const palettes = {
        circles: ['🔴', '🟠', '🟡', '🟢', '🔵', '🟣', '🟤', '⚫', '⚪'],
        squares: ['🟥', '🟧', '🟨', '🟩', '🟦', '🟪', '🟫', '⬛', '⬜'],
        hearts:  ['❤️', '🧡', '💛', '💚', '💙', '💜', '🤎', '🖤', '🤍']
    };

    // Event Listeners for controls
    upload.addEventListener('change', handleUpload);
    resolution.addEventListener('input', (e) => {
        resValue.textContent = e.target.value;
        generateEmojiArt();
    });
    styleSelect.addEventListener('change', generateEmojiArt);
    bgSelect.addEventListener('change', (e) => {
        if (e.target.value === 'light') {
            output.classList.add('light-bg');
        } else {
            output.classList.remove('light-bg');
        }
    });

    copyBtn.addEventListener('click', () => {
        if (!currentImage) {
            alert("Upload an image first!");
            return;
        }
        navigator.clipboard.writeText(output.textContent).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = "Copied!";
            setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
        });
    });

    function handleUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                currentImage = img;
                generateEmojiArt();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function generateEmojiArt() {
        if (!currentImage) return;

        const targetWidth = parseInt(resolution.value);
        const targetHeight = Math.round((currentImage.height / currentImage.width) * targetWidth * 0.65);
        const currentPalette = palettes[styleSelect.value];

        canvas.width = targetWidth;
        canvas.height = targetHeight;
        ctx.drawImage(currentImage, 0, 0, targetWidth, targetHeight);

        const imgData = ctx.getImageData(0, 0, targetWidth, targetHeight).data;
        let resultStr = "";

        for (let y = 0; y < targetHeight; y++) {
            for (let x = 0; x < targetWidth; x++) {
                const idx = (y * targetWidth + x) * 4;
                const r = imgData[idx];
                const g = imgData[idx + 1];
                const b = imgData[idx + 2];
                const a = imgData[idx + 3];

                if (a < 128) { // Transparent pixels map to the white emoji of the current set
                    resultStr += currentPalette[8];
                    continue;
                }
                resultStr += getClosestEmoji(r, g, b, currentPalette);
            }
            resultStr += "\n";
        }
        output.textContent = resultStr;
    }

    function getClosestEmoji(r, g, b, currentPalette) {
        let minDistance = Infinity;
        let bestIndex = 7; // Default to black

        for (let i = 0; i < baseColors.length; i++) {
            const color = baseColors[i];
            const distance = Math.sqrt(
                Math.pow(r - color.r, 2) +
                Math.pow(g - color.g, 2) +
                Math.pow(b - color.b, 2)
            );

            if (distance < minDistance) {
                minDistance = distance;
                bestIndex = i;
            }
        }
        return currentPalette[bestIndex];
    }
</script>

</body>
</html>
