<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelBuilder | coffee-hour</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --accent-color: #3b82f6;
            --text-color: #f3f4f6;
            --border-color: #404040;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 200px;
        }
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        button {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        button.secondary {
            background: #404040;
        }
        button.secondary:hover {
            background: #525252;
        }
        canvas {
            display: block;
        }
        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9ca3af;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="panel">
            <div class="label">Geometry</div>
            <button onclick="addBox()">Add Box</button>
            <button onclick="addSphere()">Add Sphere</button>
        </div>
        <div class="panel">
            <div class="label">I/O</div>
            <button class="secondary" onclick="exportModel()">Export (OBJ)</button>
            <input type="file" id="fileInput" style="display:none" onchange="importModel(event)">
            <button class="secondary" onclick="document.getElementById('fileInput').click()">Upload</button>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
