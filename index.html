<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUD Engine | Persistence</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }
        #input-area {
            display: flex;
            gap: 10px;
        }
        input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #00ff41;
            padding: 10px;
            flex-grow: 1;
            font-family: inherit;
        }
        #stats {
            display: flex;
            gap: 20px;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 10px;
        }
        .system { color: #555; }
        .error { color: #ff4141; }
        .item { color: #ffb86c; }
    </style>
</head>
<body>
    <div id="stats">
        ID: <span id="stat-id">None</span> | 
        Resolve: <span id="stat-resolve">0</span> | 
        Reputation: <span id="stat-reputation">0</span>
    </div>
    <div id="terminal">Welcome to the MUD. Enter your Player ID to begin...</div>
    <div id="input-area">
        <span>></span>
        <input type="text" id="cmd" autofocus>
    </div>

    <script src="main.js"></script>
</body>
</html>
