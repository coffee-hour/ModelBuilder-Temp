<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelBuilder | coffee-hour</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: 'Courier New', Courier, monospace;
            color: #ff4500;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .panel {
            background: rgba(13, 13, 13, 0.8);
            border: 1px solid #ff4500;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        button {
            background: #0d0d0d;
            color: #ff4500;
            border: 1px solid #ff4500;
            padding: 5px 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }
        button:hover {
            background: #ff4500;
            color: #0d0d0d;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .label {
            font-size: 10px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="panel">
            <div class="label">Geometry</div>
            <button onclick="addBox()">Add Box</button>
            <button onclick="addSphere()">Add Sphere</button>
        </div>
        <div class="panel">
            <div class="label">I/O</div>
            <button onclick="exportModel()">Export (OBJ)</button>
            <input type="file" id="fileInput" style="display:none" onchange="importModel(event)">
            <button onclick="document.getElementById('fileInput').click()">Upload</button>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
