<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNLESS ROGUE | Invincible Grind</title>
    <style>
        :root {
            --obsidian: #0d0d0d;
            --amber: #ff4500;
            --blood: #8b0000;
            --text: #f3f4f6;
            --panel: #151515;
        }
        body {
            background-color: var(--obsidian);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }
        #game-container {
            width: 95%;
            max-width: 600px;
            border: 2px solid var(--amber);
            padding: 20px;
            background: rgba(13, 13, 13, 0.95);
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.15);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--amber);
            margin-bottom: 15px;
            padding-bottom: 5px;
        }
        h1 {
            color: var(--amber);
            font-size: 1.8em;
            margin: 0;
            letter-spacing: 3px;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-box {
            background: var(--panel);
            padding: 10px;
            border: 1px solid #333;
            text-align: center;
        }
        .stat-label { font-size: 0.6em; color: #888; display: block; }
        .stat-val { font-size: 1.1em; color: var(--amber); font-weight: bold; }
        
        #room-display {
            height: 220px;
            background: #080808;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            position: relative;
        }
        #room-type { font-size: 0.7em; color: var(--amber); position: absolute; top: 10px; left: 10px; }
        #room-desc { font-size: 1em; line-height: 1.4; margin-bottom: 15px; }
        
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--amber);
            padding: 15px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { background: var(--amber); color: var(--obsidian); }
        button:disabled { border-color: #333; color: #444; cursor: not-allowed; }
        button.primary { background: var(--amber); color: var(--obsidian); grid-column: span 2; font-weight: bold; font-size: 1.1em; }
        
        #log {
            margin-top: 15px;
            height: 80px;
            font-size: 0.75em;
            color: #666;
            overflow-y: hidden;
            border-left: 2px solid var(--blood);
            padding-left: 10px;
        }
        .death-screen {
            position: absolute;
            inset: 0;
            background: var(--obsidian);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .death-screen h2 { color: var(--blood); font-size: 3em; margin: 0; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="header">
            <h1>SUNLESS ROGUE</h1>
            <div style="font-size: 0.7em;">Floor: <span id="floor">1</span></div>
        </div>

        <div class="stats-bar">
            <div class="stat-box">
                <span class="stat-label">RESOLVE (HP)</span>
                <span class="stat-val" id="hp">100/100</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">SPEED (HIT)</span>
                <span class="stat-val" id="speed">10</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">REPUTATION</span>
                <span class="stat-val" id="rep">0</span>
            </div>
        </div>

        <div id="room-display">
            <div id="room-type">---</div>
            <div id="room-desc">Initializing simulation...</div>
            <div id="enemy-stats" style="font-size: 0.8em; color: var(--blood); display: none;">
                Enemy Resolve: <span id="e-hp">0</span>
            </div>
        </div>

        <div class="actions" id="action-grid">
            <!-- Buttons dynamically generated -->
        </div>

        <div id="log"></div>
    </div>

    <div id="death-screen" class="death-screen">
        <h2>RECLAIMED</h2>
        <p>Your resolve has shattered.</p>
        <p style="color: var(--amber)">High Score: <span id="high-score">0</span> Rep</p>
        <button onclick="resetGame()" style="margin-top: 20px; width: 200px;">Begin Anew</button>
    </div>

    <script>
        const INITIAL_STATE = {
            hp: 100,
            maxHp: 100,
            speed: 10,
            rep: 0,
            floor: 1,
            history: []
        };

        let state = JSON.parse(localStorage.getItem('sunless_rogue_save')) || {...INITIAL_STATE};
        let currentRoom = null;
        let currentEnemy = null;

        const ui = {
            hp: document.getElementById('hp'),
            speed: document.getElementById('speed'),
            rep: document.getElementById('rep'),
            floor: document.getElementById('floor'),
            roomType: document.getElementById('room-type'),
            roomDesc: document.getElementById('room-desc'),
            actions: document.getElementById('action-grid'),
            log: document.getElementById('log'),
            eStats: document.getElementById('enemy-stats'),
            eHp: document.getElementById('e-hp'),
            death: document.getElementById('death-screen'),
            score: document.getElementById('high-score')
        };

        function save() {
            localStorage.setItem('sunless_rogue_save', JSON.stringify(state));
        }

        function addLog(msg) {
            const d = document.createElement('div');
            d.innerText = `> ${msg}`;
            ui.log.prepend(d);
            if (ui.log.children.length > 4) ui.log.lastChild.remove();
        }

        function updateUI() {
            ui.hp.innerText = `${state.hp}/${state.maxHp}`;
            ui.speed.innerText = state.speed;
            ui.rep.innerText = state.rep;
            ui.floor.innerText = state.floor;
            save();
            
            if (state.hp <= 0) {
                const high = Math.max(state.rep, localStorage.getItem('sunless_high') || 0);
                localStorage.setItem('sunless_high', high);
                ui.score.innerText = high;
                ui.death.style.display = 'flex';
            }
        }

        function resetGame() {
            state = {...INITIAL_STATE};
            ui.death.style.display = 'none';
            ui.log.innerHTML = '';
            generateRoom();
            updateUI();
        }

        function generateRoom() {
            ui.eStats.style.display = 'none';
            const r = Math.random();
            if (r < 0.6) startCombat();
            else if (r < 0.85) startLoot();
            else startEvent();
        }

        function startCombat() {
            currentRoom = 'COMBAT';
            const enemies = ['Reanimator', 'Flaxan Scout', 'Sequid Thrall', 'Viltrumite Trainee'];
            const eName = enemies[Math.floor(Math.random() * enemies.length)];
            currentEnemy = {
                name: eName,
                hp: 20 + (state.floor * 15),
                dmg: 5 + (state.floor * 3),
                speed: 5 + state.floor
            };
            
            ui.roomType.innerText = 'ENCOUNTER';
            ui.roomDesc.innerText = `A ${eName} blocks your path. It smells of ozone and blood.`;
            ui.eStats.style.display = 'block';
            ui.eHp.innerText = currentEnemy.hp;
            
            renderActions([
                { text: 'Strike', cb: handleAttack, primary: true },
                { text: 'Defensive Stance', cb: handleDefend }
            ]);
        }

        function handleAttack() {
            // Player Attack
            const hit = Math.random() * state.speed > Math.random() * currentEnemy.speed;
            if (hit) {
                const dmg = 10 + Math.floor(state.speed / 2);
                currentEnemy.hp -= dmg;
                addLog(`You strike the ${currentEnemy.name} for ${dmg}.`);
            } else {
                addLog(`The ${currentEnemy.name} dodges your blow.`);
            }

            if (currentEnemy.hp <= 0) {
                const loot = 10 + (state.floor * 5);
                state.rep += loot;
                state.floor++;
                addLog(`Target eliminated. +${loot} Reputation.`);
                generateRoom();
            } else {
                // Enemy Counter
                const eHit = Math.random() * currentEnemy.speed > Math.random() * (state.speed / 2);
                if (eHit) {
                    state.hp -= currentEnemy.dmg;
                    addLog(`The ${currentEnemy.name} tears into you. -${currentEnemy.dmg} Resolve.`);
                } else {
                    addLog(`You parry the ${currentEnemy.name}'s advance.`);
                }
            }
            ui.eHp.innerText = Math.max(0, currentEnemy.hp);
            updateUI();
        }

        function handleDefend() {
            const heal = 5 + Math.floor(state.speed / 4);
            state.hp = Math.min(state.maxHp, state.hp + heal);
            addLog(`You focus your Viltrumite cells. Recovered ${heal} Resolve.`);
            
            const eHit = Math.random() * currentEnemy.speed > Math.random() * (state.speed);
            if (eHit) {
                const reducedDmg = Math.floor(currentEnemy.dmg / 2);
                state.hp -= reducedDmg;
                addLog(`The ${currentEnemy.name} hits through your guard. -${reducedDmg} Resolve.`);
            } else {
                addLog(`You fully absorb the ${currentEnemy.name}'s attack.`);
            }
            updateUI();
        }

        function startLoot() {
            ui.roomType.innerText = 'LOOT CACHE';
            ui.roomDesc.innerText = 'You find a discarded Global Defense Agency supply crate.';
            renderActions([
                { text: 'Scavenge Stimpack (+Max HP)', cb: () => { state.maxHp += 20; state.hp += 20; state.floor++; generateRoom(); } },
                { text: 'Take Jet Thrusters (+Speed)', cb: () => { state.speed += 5; state.floor++; generateRoom(); } }
            ]);
        }

        function startEvent() {
            ui.roomType.innerText = 'ANOMALY';
            ui.roomDesc.innerText = 'Omni-Man stands over a broken skyline. "THINK, MARK!"';
            renderActions([
                { text: 'Confront Him (+Rep, -HP)', cb: () => { state.rep += 50; state.hp -= 30; state.floor++; generateRoom(); } },
                { text: 'Fly Away (+Speed, -Rep)', cb: () => { state.speed += 8; state.rep = Math.max(0, state.rep - 20); state.floor++; generateRoom(); } }
            ]);
        }

        function renderActions(acts) {
            ui.actions.innerHTML = '';
            acts.forEach(a => {
                const b = document.createElement('button');
                b.innerText = a.text;
                if (a.primary) b.className = 'primary';
                b.onclick = a.cb;
                ui.actions.appendChild(b);
            });
        }

        updateUI();
        generateRoom();
    </script>
</body>
</html>
